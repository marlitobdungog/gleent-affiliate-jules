services:
  frontend:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./:/app
    networks:
      - sprinthr

  backend:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    command: sh -lc "mkdir -p database && touch database/database.sqlite && php artisan migrate --force --no-interaction && php-fpm"
    volumes:
      - ./backend:/var/www
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sprinthr

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8089:80"
    volumes:
      - ./backend:/var/www
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - sprinthr

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sprinthr
      MYSQL_USER: sprinthr
      MYSQL_PASSWORD: sprinthr
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sprinthr

volumes:
  mysql_data:

networks:
  sprinthr:
    driver: bridge
