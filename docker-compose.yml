services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    restart: unless-stopped
    networks:
      - gleent_affiliate

  backend:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: gleent_affiliate
      DB_USERNAME: gleent_affiliate
      DB_PASSWORD: gleent_affiliate
      APP_URL: http://localhost:8089
      SANCTUM_STATEFUL_DOMAINS: localhost,localhost:8089,127.0.0.1,127.0.0.1:8089
    command: >
      sh -lc "mysql --skip-ssl -h db -uroot -proot -e \"CREATE DATABASE IF NOT EXISTS gleent_affiliate_test; CREATE USER IF NOT EXISTS 'gleent_affiliate'@'%' IDENTIFIED BY 'gleent_affiliate'; GRANT ALL PRIVILEGES ON gleent_affiliate.* TO 'gleent_affiliate'@'%'; GRANT ALL PRIVILEGES ON gleent_affiliate_test.* TO 'gleent_affiliate'@'%'; FLUSH PRIVILEGES;\" &&
      php artisan migrate --force --no-interaction &&
      php-fpm"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gleent_affiliate

  web:
    build:
      context: ./backend
      dockerfile: docker/nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "8089:80"
    depends_on:
      - frontend
      - backend
    networks:
      - gleent_affiliate

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gleent_affiliate
      MYSQL_USER: gleent_affiliate
      MYSQL_PASSWORD: gleent_affiliate
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3311:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - gleent_affiliate

volumes:
  mysql_data:

networks:
  gleent_affiliate:
    name: gleent_affiliate
    driver: bridge
